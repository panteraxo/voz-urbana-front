<div class="d-flex min-vh-100 style-dashboard-wrapper">
  
  <aside class="style-sidebar bg-dark text-white p-3 d-flex flex-column justify-content-between border-end border-secondary">
    <div>
      <div class="d-flex align-items-center gap-2 mb-4 px-2">
        <i class="bi bi-building-fill text-info fs-4"></i>
        <span class="fs-5 fw-bold tracking-wide">VozUrbana</span>
      </div>
      
      <hr class="border-secondary mb-4">
      
      <nav class="nav flex-column gap-2">
        <a class="nav-link text-white rounded d-flex align-items-center gap-3 py-2 px-3 style-nav-item" 
           routerLink="/dashboard/incidencias" 
           routerLinkActive="active bg-info text-dark fw-bold">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span>Incidencias</span>
        </a>
        
        <a class="nav-link text-white rounded d-flex align-items-center gap-3 py-2 px-3 style-nav-item" 
           routerLink="/dashboard/inventario" 
           routerLinkActive="active bg-info text-dark fw-bold">
          <i class="bi bi-box-seam-fill"></i>
          <span>Inventario</span>
        </a>
      </nav>
    </div>

    <div class="d-flex flex-column gap-2">
      <hr class="border-secondary my-2">
      <button (click)="logout()" class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center gap-2 py-2">
        <i class="bi bi-box-arrow-left"></i>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <div class="flex-grow-1 d-flex flex-column bg-dark text-white style-content-area">
    
    <header class="navbar navbar-dark bg-secondary px-4 py-3 border-bottom border-secondary d-flex justify-content-between align-items-center style-topbar">
      <div class="d-flex align-items-center gap-2 text-white-50">
        <i class="bi bi-geo-alt-fill text-info"></i>
        <span>Municipalidad Actual: <strong class="text-white">{{ municipioNombre }}</strong></span>
      </div>
      
      <div class="d-flex align-items-center gap-3">
        <div class="text-end d-none d-md-block">
          <p class="m-0 small fw-bold lh-1 text-white">{{ usuarioUsername }}</p>
          <span class="text-white-50 small fs-7">{{ usuarioRol }}</span>
        </div>
        <div class="bg-info text-dark rounded-circle d-flex align-items-center justify-content-center fw-bold style-avatar">
          {{ usuarioUsername.charAt(0) }}
        </div>
      </div>
    </header>

    <main class="p-4 flex-grow-1 overflow-auto">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
